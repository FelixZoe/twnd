name: Build & Test
on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
jobs:
  build-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven
      - name: Build Backend with Maven
        run: |
          cd Backend
          mvn clean package -DskipTests

  build-frontend:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        frontend: [Frontend-Blog, Frontend-Admin, Frontend-Home, Frontend-Cv]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.12'
          cache: 'pnpm'
      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 9
      - name: Build ${{ matrix.frontend }}
        run: |
          cd ${{ matrix.frontend }}
          pnpm install
          pnpm build