services:
  mysql:
    image: mysql:8.0
    container_name: felixzoe-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: your_root_password_here
      MYSQL_DATABASE: FeiTwnd
      MYSQL_USER: feitwnd
      MYSQL_PASSWORD: your_db_password_here
      TZ: Asia/Shanghai
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/init:/docker-entrypoint-initdb.d
    ports:
      - "3306:3306"
    networks:
      - felixzoe-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 15
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-authentication-plugin=mysql_native_password

  redis:
    image: redis:7-alpine
    container_name: felixzoe-redis
    restart: always
    ports:
      - "6379:6379"
    networks:
      - felixzoe-network
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: felixzoe-backend
    restart: always
    environment:
      # === Spring Profile ===
      SPRING_PROFILES_ACTIVE: docker
      TZ: Asia/Shanghai
      # === MySQL 数据库 ===
      MYSQL_HOST: mysql
      MYSQL_PORT: "3306"
      MYSQL_DATABASE: FeiTwnd
      MYSQL_USER: feitwnd
      MYSQL_PASSWORD: your_db_password_here
      # === Redis ===
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_PASSWORD: ""
      REDIS_DATABASE: "0"
      # === JWT 认证 ===
      JWT_SECRET_KEY: your_jwt_secret_here
      JWT_TTL: "86400000"
      # === 阿里云 OSS (图片存储 - 暂用占位符，需要时替换) ===
      # === 本地文件存储 ===
      LOCAL_STORAGE_PATH: /app/uploads
      LOCAL_STORAGE_ACCESS_URL: https://darker.one/uploads
      # === 阿里云 OSS (已弃用) ===
      ALIOSS_ENDPOINT: placeholder
      ALIOSS_ACCESS_KEY_ID: placeholder
      ALIOSS_ACCESS_KEY_SECRET: placeholder
      ALIOSS_BUCKET_NAME: placeholder
      # === 邮箱 (暂用占位符，需要时替换) ===
      MAIL_HOST: smtp.qq.com
      MAIL_PORT: "587"
      MAIL_USERNAME: your_email@example.com
      MAIL_PASSWORD: your_email_password_here
      EMAIL_PERSONAL: FelixZoe
      EMAIL_FROM: your_email@example.com
      # === 游客验证码 ===
      VISITOR_VERIFY_CODE: your_visitor_code_here
      # === 图片压缩 ===
      IMAGE_COMPRESS_ENABLED: "true"
      IMAGE_COMPRESS_MAX_SIZE: "500"
      IMAGE_COMPRESS_QUALITY: "0.9"
      # === 网站地址 ===
      WEBSITE_TITLE: MyWebsite
      WEBSITE_HOME: "https://darker.one"
      WEBSITE_ADMIN: "https://darker.one/admin"
      WEBSITE_CV: "https://darker.one/cv"
      WEBSITE_BLOG: "https://darker.one/blog"
    ports:
      - "5922:5922"
    networks:
      - felixzoe-network
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./docker/app/logs:/app/logs
      - ./docker/html/uploads:/app/uploads

  nginx:
    image: nginx:alpine
    container_name: felixzoe-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    networks:
      - felixzoe-network
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/nginx/conf.d:/etc/nginx/conf.d:ro
      - ./docker/nginx/sites-enabled:/etc/nginx/sites-enabled:ro
      - ./docker/html:/var/www:ro
      - ./docker/html/uploads:/var/www/uploads:rw
      - nginx_logs:/var/log/nginx
    depends_on:
      - backend
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  mysql_data:
  redis_data:
  nginx_logs:

networks:
  felixzoe-network:
    driver: bridge
